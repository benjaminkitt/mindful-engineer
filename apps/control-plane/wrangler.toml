name = "mindful-engineer-control-plane"
main = "src/index.ts"
compatibility_date = "2026-04-22"
workers_dev = false
routes = [{ pattern = "notes.mindful.engineer", custom_domain = true }]

[vars]
ACCESS_PROTECTION_MODE = "cloudflare-access"
ACCESS_TEAM_DOMAIN = "https://kittfam.cloudflareaccess.com"
ACCESS_AUD = "c0fab929844b8f993ad9611651ed280ce6bdc4eea980dc4896fe41c8df40a72a"
GITHUB_API_BASE_URL = "https://api.github.com"
GITHUB_CONTENT_ROOT = "apps/public-site/src/content"
GITHUB_BRANCH = "main"
GITHUB_OWNER = "benjaminkitt"
GITHUB_REPO = "mindful-engineer"
# GITHUB_TOKEN is a Worker secret. Set it with: npx wrangler secret put GITHUB_TOKEN

[[d1_databases]]
binding = "DB"
database_name = "mindful-engineer"
database_id = "216cb002-2437-4af8-a338-70e2a8b6f5cc"
migrations_dir = "migrations"
